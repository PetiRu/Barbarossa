services:
  # Main BARBAROSSA scanner
  barbarossa:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: barbarossa-scanner
    user: "1000:1000"
    volumes:
      # Mount source code for scanning
      - ${SCAN_SOURCE:-.}:/scan-source:ro
      # Mount reports output
      - ${REPORTS_DIR:-./reports}:/app/reports
    environment:
      - BARBAROSSA_AUTHORIZED=true
      - PYTHONUNBUFFERED=1
    command: >
      scan
      --source /scan-source
      --target http://vulnerable-demo:8000
      --format console,json,html,sarif
      --output /app/reports
      --authorized
      --allowlist private:vulnerable-demo
    depends_on:
      vulnerable-demo:
        condition: service_healthy
    networks:
      - barbarossa-net

  # Vulnerable demo app for testing
  vulnerable-demo:
    build:
      context: ./examples/vulnerable_demo_app
      dockerfile: Dockerfile.demo
    container_name: barbarossa-vulnerable-demo
    ports:
      - "8080:8000"
    networks:
      - barbarossa-net

  # Secure demo app for comparison
  secure-demo:
    build:
      context: ./examples/vulnerable_demo_app
      dockerfile: Dockerfile.demo
    container_name: barbarossa-secure-demo
    ports:
      - "8081:8000"
    volumes:
      - ./examples/secure_demo_app/app.py:/app/app.py:ro
    networks:
      - barbarossa-net

networks:
  barbarossa-net:
    driver: bridge

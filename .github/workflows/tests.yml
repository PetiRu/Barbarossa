name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and development tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Check formatting
        run: ruff format --check .

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy barbarossa tests main.py

      - name: Run tests with coverage gate
        run: pytest --cov=barbarossa --cov-report=xml --cov-fail-under=55

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  wheel:
    name: Wheel install smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel
      - name: Install and exercise wheel
        run: |
          python -m venv /tmp/barbarossa-wheel
          /tmp/barbarossa-wheel/bin/pip install dist/*.whl
          /tmp/barbarossa-wheel/bin/pip check
          /tmp/barbarossa-wheel/bin/barbarossa --help
          /tmp/barbarossa-wheel/bin/python -c "import barbarossa.inspect.scanner, barbarossa.probe.client, barbarossa.reporting.html_report, barbarossa.utils.rate_limit"

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose and build images
        run: |
          docker compose config --quiet
          docker compose build
